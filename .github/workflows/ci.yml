name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Skill and docs drift guard
        run: sh scripts/ci-drift-check.sh

      - name: Dogfood basic workflow
        run: sh examples/dogfood-basic/run.sh

      - name: Dogfood harness workflow
        run: sh examples/dogfood-harness/run.sh

      - name: Concurrency stress smoke
        run: sh examples/stress/ci-smoke.sh
